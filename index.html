<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create your account</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
 <link rel="stylesheet" href="style.css">
  <style>
    :root {
      --bg: #f5f7fb;
      --card-bg: #ffffff;
      --text-main: #22252f;
      --text-muted: #6f7480;
      --accent: #4b6cff;
      --accent-soft: #e0e6ff;
      --border: #d7dbe7;
      --input-bg: #f9fafc;
    }

    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text-main);
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 24px;
    }

    .card {
      background: var(--card-bg);
      border-radius: 18px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      padding: 28px 24px 24px;
    }

    .header {
      margin-bottom: 20px;
    }

    .header-title {
      font-size: 24px;
      font-weight: 600;
      margin: 0 0 6px;
    }

    .header-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin: 0;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text-main);
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease,
        background-color 0.15s ease;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent-soft);
      background: #ffffff;
    }

    .hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .button-row {
      margin-top: 18px;
    }

    button {
      width: 100%;
      padding: 11px 14px;
      border-radius: 999px;
      border: none;
      background: var(--accent);
      color: #ffffff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.15s ease, transform 0.08s ease;
    }

    button:hover {
      background: #3f5ae0;
    }

    button:active {
      transform: scale(0.98);
    }

    .footer-hint {
      margin-top: 10px;
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
    }

    .success-message {
      margin-top: 14px;
      font-size: 13px;
      color: #1a7f4b;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <h1 class="header-title">Create your account</h1>
        <p class="header-subtitle">Just a few quick details.</p>
      </div>

      <form id="contact-form">
        <div class="form-group">
          <label for="name">Name</label>
          <input
            id="name"
            name="name"
            type="text"
            autocomplete="name"
            placeholder="Hannah"
            required
          />
          <div class="hint">How you’d like to be addressed.</div>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            placeholder="you@example.com"
            required
          />
          <div class="hint">We’ll only use this for your account.</div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="new-password"
            placeholder="••••••••"
            required
          />
          <div class="hint">At least 8 characters is a good start.</div>
        </div>

        <div class="button-row">
          <button type="submit">Next</button>
        </div>

        <div class="footer-hint">
          This will only take a moment.
        </div>

        <div class="success-message" id="success-message">
          Form submitted (for now we just log it). ✨
        </div>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById("contact-form");
    const successMessage = document.getElementById("success-message");

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      const data = {
        name: form.name.value.trim(),
        email: form.email.value.trim(),
        password: form.password.value.trim(),
      };

      console.log("Form data:", data);

      successMessage.style.display = "block";
      successMessage.textContent =
        "Form captured. This is our calm baseline. 🌿";
    });
  </script>
<script src="script.js"></script>
</body>
</html>
