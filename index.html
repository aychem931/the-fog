<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create your account</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <div class="card">
      <h1><span class="swap-word drift-word">Create</span> your account</h1>
      <p class="subtitle">Just a few <span class="swap-word drift-word">quick</span> details.</p>

      <form id="signupForm">
        <label><span class="swap-word drift-word">Name</span>:</label>
        <input type="text" id="name" placeholder="Name" required />

        <label><span class="swap-word drift-word">Email</span>:</label>
        <input type="email" id="email" placeholder="you@example.com" required />

        <label><span class="swap-word drift-word">Password</span>:</label>
        <input type="password" id="password" placeholder="********" required />

        <button type="submit">Submit</button>
      </form>

      <p id="successMessage" class="success-message">
        This will only take a moment.
      </p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
