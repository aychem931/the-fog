<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create your account</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
 <link rel="stylesheet" href="style.css">
  </head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <h1 class="header-title">Create your account</h1>
        <p class="header-subtitle">Just a few quick details.</p>
      </div>

      <form id="contact-form">
        <div class="form-group">
          <label for="name">Name</label>
          <input
            id="name"
            name="name"
            type="text"
            autocomplete="name"
            placeholder="Hannah"
            required
          />
          <div class="hint">How you’d like to be addressed.</div>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            placeholder="you@example.com"
            required
          />
          <div class="hint">We’ll only use this for your account.</div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="new-password"
            placeholder="••••••••"
            required
          />
          <div class="hint">At least 8 characters is a good start.</div>
        </div>

        <div class="button-row">
          <button type="submit">Next</button>
        </div>

        <div class="footer-hint">
          This will only take a moment.
        </div>

        <div class="success-message" id="success-message">
          Form submitted (for now we just log it). ✨
        </div>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById("contact-form");
    const successMessage = document.getElementById("success-message");

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      const data = {
        name: form.name.value.trim(),
        email: form.email.value.trim(),
        password: form.password.value.trim(),
      };

      console.log("Form data:", data);

      successMessage.style.display = "block";
      successMessage.textContent =
        "Form captured. This is our calm baseline. 🌿";
    });
  </script>
<script src="script.js"></script>
</body>
</html>
